<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando para WhatsApp...</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #25D366;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Conectando ao WhatsApp...</h1>
    <p>Você será redirecionado em instantes.</p>
  </div>

  <!-- Google Ads gtag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18004522237"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-18004522237');
  </script>

  <script>
    (function() {
      'use strict';

      // ========== CONFIG ==========
      var CONFIG = {
        supabaseUrl: 'https://xjngdyhzpgktddxfmdgq.supabase.co',
        supabaseAnonKey: 'sb_publishable_gS5lC6Jhugq73v-_MMzM7g_GGWFDNZc',
        whatsappNumber: '551332242131',
        googleAdsConversionId: 'AW-18004522237',
        googleAdsConversionLabel: 'i7tcCK30hJwcEP3pnIlD',
        redirectDelay: 800
      };

      // ========== HELPERS ==========
      function getCookie(name) {
        var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? decodeURIComponent(match[2]) : null;
      }

      function getUrlParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name) || '';
      }

      function generateProtocol() {
        var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        var code = '';
        for (var i = 0; i < 5; i++) {
          code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return 'RA-' + code;
      }

      // ========== COLLECT DATA ==========
      var data = {
        protocolo: generateProtocol(),
        visitor_id: getCookie('_ra_visitor') || ('v_' + Date.now()),
        gclid: getCookie('_ra_gclid') || getUrlParam('gclid') || null,
        utm_source: getCookie('_ra_utm_source') || getUrlParam('utm_source') || null,
        utm_medium: getCookie('_ra_utm_medium') || getUrlParam('utm_medium') || null,
        utm_campaign: getCookie('_ra_utm_campaign') || getUrlParam('utm_campaign') || null,
        utm_term: getCookie('_ra_utm_term') || getUrlParam('utm_term') || null,
        utm_content: getCookie('_ra_utm_content') || getUrlParam('utm_content') || null
      };

      // ========== SAVE TO SUPABASE ==========
      if (CONFIG.supabaseAnonKey) {
        fetch(CONFIG.supabaseUrl + '/rest/v1/wa_conversions', {
          method: 'POST',
          headers: {
            'apikey': CONFIG.supabaseAnonKey,
            'Authorization': 'Bearer ' + CONFIG.supabaseAnonKey,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(data)
        }).catch(function(err) {
          console.error('Supabase error:', err);
        });
      }

      // ========== FIRE GOOGLE ADS CONVERSION ==========
      if (typeof gtag === 'function') {
        gtag('event', 'conversion', {
          send_to: CONFIG.googleAdsConversionId + '/' + CONFIG.googleAdsConversionLabel,
          value: 0,
          currency: 'BRL'
        });
      }

      // ========== REDIRECT TO WHATSAPP ==========
      var message = 'Olá, gostaria de agendar uma consulta. (ref: ' + data.protocolo + ')';
      var waUrl = 'https://wa.me/' + CONFIG.whatsappNumber + '?text=' + encodeURIComponent(message);

      setTimeout(function() {
        window.location.href = waUrl;
      }, CONFIG.redirectDelay);

    })();
  </script>
</body>
</html>
